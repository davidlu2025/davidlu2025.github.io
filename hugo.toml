baseURL = "https://davidlu2025.github.io/"
languageCode = "zh-cn"
title = "David Lu"
theme = "PaperMod"
paginate = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  author = "David Lu"
  description = "Personal blog and project showcase"
  keywords = ["Blog", "Portfolio", "Tech", "Developer"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.label]
    text = "David Lu"

  [params.homeInfoParams]
    Title = "Hi, I'm David Lu"
    Content = "Welcome to my personal blog! I share tech articles and project experiences here. Browse [Posts](/posts) · [Projects](/projects) · [About](/about)"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/davidlu2025"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:davidluwin7@gmail.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
